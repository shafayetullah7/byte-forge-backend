services:
  app:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET:-development}
    env_file: .env.${NODE_ENV} # Dynamic env file loading
    ports:
      - '${APP_EXTERNAL_PORT}:${PORT}'
    volumes:
      - .:/app # Live code sync
      - /app/node_modules # Isolate node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_EXTERNAL_PORT}:5432'
    volumes:
      - pgdata_${NODE_ENV}:/var/lib/postgresql/data # Dynamic volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata_development:
  pgdata_test:
  pgdata_production:
