name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Join Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          PORT: ${{ vars.PORT }}
          APP_NAME: ${{ vars.APP_NAME }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_USER: ${{ vars.DB_USER }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_EXTERNAL_PORT: ${{ vars.APP_EXTERNAL_PORT }}
          DOCKER_BUILD_TARGET: ${{ vars.DOCKER_BUILD_TARGET }}

        run: |
          # Pass env file via SSH pipe (no heredoc complexity)
          printf "%s\n" \
            "NODE_ENV=$NODE_ENV" \
            "PORT=$PORT" \
            "APP_NAME=$APP_NAME" \
            "DB_HOST=$DB_HOST" \
            "DB_PORT=$DB_PORT" \
            "DB_USER=$DB_USER" \
            "DB_PASSWORD=$DB_PASSWORD" \
            "DB_NAME=$DB_NAME" \
            "APP_EXTERNAL_PORT=$APP_EXTERNAL_PORT" \
            "DOCKER_BUILD_TARGET=$DOCKER_BUILD_TARGET" \
            | tailscale ssh shafayet@home-server "cat > $DEPLOY_DIR/.env.production"

          # Deploy commands
          tailscale ssh shafayet@home-server << EOF
            set -euo pipefail

            # Export variables for remote use (CRITICAL for health check)
            export APP_EXTERNAL_PORT="$APP_EXTERNAL_PORT"
            export DEPLOY_DIR="$DEPLOY_DIR"

            cd "\$DEPLOY_DIR"

            # Clean git state (remove everything, including ignored files)
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fdx

            docker compose --env-file .env.production up -d --build --remove-orphans

            # Health check with ISO timestamp logging
            for i in \$(seq 1 30); do
              if curl -fsS http://localhost:\$APP_EXTERNAL_PORT >/dev/null; then
                echo "[$(date -Is)] Health check passed on attempt \$i"
                break
              fi
              echo "[$(date -Is)] Waiting for service... (attempt \$i/30)"
              sleep 2
            done

            # Final verification
            curl -fsS http://localhost:\$APP_EXTERNAL_PORT || exit 1
          EOF