name: CD

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Join Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Deploy
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          NODE_ENV: ${{ vars.NODE_ENV }}
          PORT: ${{ vars.PORT }}
          APP_NAME: ${{ vars.APP_NAME }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}

          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_USER: ${{ vars.DB_USER }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_SSL: ${{ vars.DB_SSL }}

          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          APP_EXTERNAL_PORT: ${{ vars.APP_EXTERNAL_PORT }}
          DB_EXTERNAL_PORT: ${{ vars.DB_EXTERNAL_PORT }}
          DOCKER_BUILD_TARGET: ${{ vars.DOCKER_BUILD_TARGET }}

          SALT_ROUNDS: ${{ vars.SALT_ROUNDS }}

          MAIL_PROVIDER: ${{ vars.MAIL_PROVIDER }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_SECURE: ${{ vars.MAIL_SECURE }}
          MAIL_USER: ${{ vars.MAIL_USER }}
          MAIL_FROM_NAME: ${{ vars.MAIL_FROM_NAME }}
          MAIL_FROM_EMAIL: ${{ vars.MAIL_FROM_EMAIL }}

          SESSION_MAX_AGE: ${{ vars.SESSION_MAX_AGE }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}

          JWT_ADMIN_ACCESS_EXP: ${{ vars.JWT_ADMIN_ACCESS_EXP }}
          JWT_ADMIN_REFRESH_EXP: ${{ vars.JWT_ADMIN_REFRESH_EXP }}
          JWT_USER_ACCESS_EXP: ${{ vars.JWT_USER_ACCESS_EXP }}
          JWT_USER_REFRESH_EXP: ${{ vars.JWT_USER_REFRESH_EXP }}

          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}

          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

          JWT_SECRET_RESET_REQUEST: ${{ secrets.JWT_SECRET_RESET_REQUEST }}
          JWT_SECRET_RESET_ACCESS: ${{ secrets.JWT_SECRET_RESET_ACCESS }}

          JWT_ADMIN_ACCESS_SECRET: ${{ secrets.JWT_ADMIN_ACCESS_SECRET }}
          JWT_ADMIN_REFRESH_SECRET: ${{ secrets.JWT_ADMIN_REFRESH_SECRET }}

          JWT_USER_ACCESS_SECRET: ${{ secrets.JWT_USER_ACCESS_SECRET }}
          JWT_USER_REFRESH_SECRET: ${{ secrets.JWT_USER_REFRESH_SECRET }}

          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

        run: |
          set -euo pipefail

          echo "Deploy triggered"

          tailscale ssh shafayet@home-server bash -s <<EOF
          set -euo pipefail

          export NODE_ENV="$NODE_ENV"
          export PORT="$PORT"
          export APP_NAME="$APP_NAME"
          export FRONTEND_URL="$FRONTEND_URL"

          export DB_HOST="$DB_HOST"
          export DB_PORT="$DB_PORT"
          export DB_USER="$DB_USER"
          export DB_PASSWORD="$DB_PASSWORD"
          export DB_NAME="$DB_NAME"
          export DB_SSL="$DB_SSL"

          export COMPOSE_PROJECT_NAME="$COMPOSE_PROJECT_NAME"
          export APP_EXTERNAL_PORT="$APP_EXTERNAL_PORT"
          export DB_EXTERNAL_PORT="$DB_EXTERNAL_PORT"
          export DOCKER_BUILD_TARGET="$DOCKER_BUILD_TARGET"

          export SALT_ROUNDS="$SALT_ROUNDS"

          export MAIL_PROVIDER="$MAIL_PROVIDER"
          export MAIL_HOST="$MAIL_HOST"
          export MAIL_PORT="$MAIL_PORT"
          export MAIL_SECURE="$MAIL_SECURE"
          export MAIL_USER="$MAIL_USER"
          export MAIL_PASSWORD="$MAIL_PASSWORD"
          export MAIL_FROM_NAME="$MAIL_FROM_NAME"
          export MAIL_FROM_EMAIL="$MAIL_FROM_EMAIL"

          export SESSION_MAX_AGE="$SESSION_MAX_AGE"
          export COOKIE_DOMAIN="$COOKIE_DOMAIN"

          export JWT_ADMIN_ACCESS_EXP="$JWT_ADMIN_ACCESS_EXP"
          export JWT_ADMIN_REFRESH_EXP="$JWT_ADMIN_REFRESH_EXP"
          export JWT_USER_ACCESS_EXP="$JWT_USER_ACCESS_EXP"
          export JWT_USER_REFRESH_EXP="$JWT_USER_REFRESH_EXP"

          export CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME"
          export CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY"
          export CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET"

          export JWT_SECRET_RESET_REQUEST="$JWT_SECRET_RESET_REQUEST"
          export JWT_SECRET_RESET_ACCESS="$JWT_SECRET_RESET_ACCESS"

          export JWT_ADMIN_ACCESS_SECRET="$JWT_ADMIN_ACCESS_SECRET"
          export JWT_ADMIN_REFRESH_SECRET="$JWT_ADMIN_REFRESH_SECRET"

          export JWT_USER_ACCESS_SECRET="$JWT_USER_ACCESS_SECRET"
          export JWT_USER_REFRESH_SECRET="$JWT_USER_REFRESH_SECRET"

          cd "$DEPLOY_DIR"

          test -d .git || { echo "No git repo at $DEPLOY_DIR"; exit 1; }
          git remote get-url origin | grep -q 'byte-forge-backend' || { echo "Unexpected git remote"; exit 1; }
          command -v docker >/dev/null || { echo "docker not found"; exit 1; }
          command -v envsubst >/dev/null || { echo "envsubst not found"; exit 1; }

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          bash scripts/deploy.sh
          EOF
